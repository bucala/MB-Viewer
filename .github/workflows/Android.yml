name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Pri rýchlych po sebe idúcich push-och nechaj bežať len najnovší build.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Poistka proti zaseknutému behu (npm/Gradle) — neminie runner minúty.
    timeout-minutes: 30

    steps:
    - name: Stiahnutie kódu
      uses: actions/checkout@v4

    - name: Nastavenie Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    # Android Gradle Plugin (cez Capacitor) vyžaduje Java 21.
    # 'cache: gradle' tu nefunguje — gradle súbory v repozitári nie sú,
    # android/ projekt sa generuje až v kroku `cap add android` nižšie.
    - name: Nastavenie Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # postinstall zároveň skopíruje occt-import-js WASM runtime do public/.
    - name: Inštalácia npm závislostí
      run: npm ci

    # Capacitor potrebuje hotové webové assety (dist/) ešte pred `cap add`.
    - name: Build webových assetov
      run: npm run build

    # android/ je gitignorovaný — natívny projekt sa generuje nanovo
    # a následne sa doň synchronizujú webové assety a konfigurácia.
    - name: Vygenerovanie Android projektu (Capacitor)
      run: npx cap add android

    - name: Synchronizácia assetov do Android projektu
      run: npx cap sync android

    # Nahradí šablónové Capacitor ikony brandom MB Viewer (mipmapy + adaptívna
    # ikona) — android/ je generovaný, ikony sa aplikujú pri každom builde.
    - name: Aplikovanie ikon aplikácie
      run: node scripts/android-icons.mjs

    - name: Udelenie práv na spustenie pre Gradle Wrapper
      run: chmod +x ./gradlew
      working-directory: ./android

    - name: Vygenerovanie Debug APK
      run: ./gradlew assembleDebug --no-daemon
      working-directory: ./android

    - name: Uloženie APK do artefaktov
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
